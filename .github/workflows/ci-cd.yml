name: Backend CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

  build-and-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: image_name
        name: Image name (GHCR lowercase)
        run: |
          R=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${R}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Docker tags
        run: |
          SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "sha_tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.image_name.outputs.name }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.image_name.outputs.name }}:${{ steps.meta.outputs.branch_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/franmaster08/anyjobs-backend:sha-${{ steps.sha.outputs.short }}
          DEPLOY_SCRIPT: ${{ secrets.VPS_DEPLOY_SCRIPT }}
          DEPLOY_ROOT: ${{ secrets.ANYJOBS_DEPLOY_ROOT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: IMAGE,DEPLOY_SCRIPT,DEPLOY_ROOT
          script: |
            set -euo pipefail
            SCRIPT="${DEPLOY_SCRIPT:-}"
            if [ -z "$SCRIPT" ]; then
              for candidate in \
                "$HOME/entorno/anyjobs-deploy.sh" \
                "$HOME/entorno/anyjobs-deploy/anyjobs-deploy.sh" \
                "$HOME/entorno/anyjobs-deploy/vps/anyjobs-deploy.sh"; do
                if [ -f "$candidate" ]; then SCRIPT="$candidate"; break; fi
              done
            fi
            if [ -z "$SCRIPT" ] || [ ! -f "$SCRIPT" ]; then
              echo "anyjobs-deploy: no se encontró el script (define VPS_DEPLOY_SCRIPT)" >&2
              exit 2
            fi
            BASE="${DEPLOY_ROOT:-}"
            if [ -z "$BASE" ]; then
              for candidate in \
                "$HOME/entorno" \
                "$HOME/entorno/production" \
                "$HOME/entorno-production" \
                "/opt/anyjobs/production"; do
                if [ -f "$candidate/.env" ]; then BASE="$candidate"; break; fi
              done
            fi
            if [ -z "$BASE" ] || [ ! -f "$BASE/.env" ]; then
              echo "anyjobs-deploy: no hay .env (define ANYJOBS_DEPLOY_ROOT)" >&2
              exit 2
            fi
            export ANYJOBS_DEPLOY_ROOT="$BASE"
            bash "$SCRIPT" --env production --service anyjobs-back --image "$IMAGE"
